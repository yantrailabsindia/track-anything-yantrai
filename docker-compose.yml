version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./data:/app/data
      - ./dist:/app/dist
    environment:
      - SECRET_KEY=${SECRET_KEY:-prome-secret-key-change-in-production-2026}
      - DATABASE_URL=sqlite:////app/data/prome.db
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - GCS_PROJECT_ID=${GCS_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
    restart: always

  frontend:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  data:
